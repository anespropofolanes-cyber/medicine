<style>
  :root{
    --bg:#f6f5ef; --card:#ffffff; --line:#d3d2c9; --line2:#e7e6de;
    --txt:#2b2c26; --dim:#6f7065; --faint:#a3a398;
    --accent:#6a8322; --accent-soft:#eef0df;
    --gold:#dec477; --gold-soft:#f5eed6;
    --warn:#9c5324;
    --radius:10px;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--bg); color:var(--txt);
    font-family:-apple-system,"PingFang TC","Noto Sans TC","Segoe UI",system-ui,sans-serif;
    line-height:1.55; -webkit-font-smoothing:antialiased; font-size:15px;
  }
  header{
    position:sticky; top:0; z-index:20; background:rgba(245,246,248,.94);
    backdrop-filter:blur(10px); border-bottom:1px solid var(--line); padding:13px 20px 11px;
  }
  .title-row{display:flex; align-items:center; gap:9px; flex-wrap:wrap; margin-bottom:11px}
  .brand-logo{height:24px; width:auto; flex:none; mix-blend-mode:multiply; margin-right:1px}
  h1{font-size:18px; margin:0; letter-spacing:.5px; font-weight:700}
  .subtitle{color:var(--dim); font-size:12.5px}
  .count-pill{margin-left:auto; color:var(--faint); font-size:12px}
  .search-wrap{position:relative; margin-bottom:9px}
  #search{
    width:100%; padding:10px 13px 10px 36px; font-size:14.5px;
    background:var(--card); border:1px solid var(--line); border-radius:8px; color:var(--txt); outline:none;
  }
  #search:focus{border-color:var(--accent)}
  .search-wrap svg{position:absolute; left:11px; top:11px; color:var(--faint)}
  .filters{display:flex; gap:6px; flex-wrap:wrap}
  .chip{
    padding:4px 11px; font-size:12.5px; border-radius:16px; cursor:pointer;
    background:var(--card); border:1px solid var(--line); color:var(--dim); user-select:none; transition:.12s; white-space:nowrap;
  }
  .chip:hover{color:var(--txt); border-color:var(--faint)}
  .chip.active{background:var(--accent); color:#fff; border-color:var(--accent); font-weight:600}

  main{max-width:1080px; margin:0 auto; padding:16px 16px 80px}
  .cat-head{
    font-size:12px; color:var(--dim); text-transform:uppercase; letter-spacing:1.2px;
    margin:22px 3px 9px; font-weight:600; border-left:3px solid var(--accent); padding-left:9px;
  }
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:11px}
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; transition:.12s;
  }
  .card:hover{border-color:var(--faint)}
  .card-top{padding:12px 14px 11px; cursor:pointer}
  .class-tag{
    display:block; font-size:11px; color:var(--dim); letter-spacing:.3px;
    text-transform:none; margin-bottom:5px; font-weight:500;
  }
  .name-row{display:flex; align-items:baseline; gap:7px; flex-wrap:wrap}
  .drug-name{font-size:16.5px; font-weight:700; margin:0; letter-spacing:.2px}
  .drug-alias{font-size:12.5px; color:var(--faint); font-weight:400}
  .mech{font-size:12.5px; color:var(--dim); margin-top:5px; line-height:1.5}

  .quick{
    display:flex; gap:14px; margin-top:11px; padding:9px 11px;
    background:var(--gold-soft); border-radius:8px; flex-wrap:wrap;
    border:1px solid #ece3c6;
  }
  .q{display:flex; flex-direction:column; gap:1px; min-width:64px}
  .q .lbl{font-size:10px; color:var(--dim); letter-spacing:.4px; text-transform:uppercase}
  .q .val{font-size:13.5px; font-weight:700; line-height:1.25; color:var(--txt)}
  .q.dose .val{color:var(--accent)}

  .card-foot{display:flex; gap:7px; padding:0 14px 12px; align-items:center; margin-top:2px}
  .btn{
    font-size:12px; padding:6px 11px; border-radius:7px; border:1px solid var(--line);
    background:var(--card); color:var(--txt); cursor:pointer; text-decoration:none; transition:.12s; white-space:nowrap;
  }
  .btn:hover{border-color:var(--accent); color:var(--accent)}
  .btn.insert{border-color:var(--accent); color:var(--accent); font-weight:600}
  .btn.insert:hover{background:var(--accent); color:#fff}
  .btn.insert.pending{border-color:var(--line); color:var(--faint); cursor:default; font-weight:400}
  .btn.insert.pending:hover{background:var(--card); color:var(--faint)}
  .expand-btn{margin-left:auto; color:var(--dim); background:none; border:none; cursor:pointer; font-size:12px}
  .expand-btn:hover{color:var(--accent)}

  .detail{max-height:0; overflow:hidden; transition:max-height .28s ease; border-top:1px solid transparent}
  .card.open .detail{max-height:1400px; border-top-color:var(--line2)}
  .detail-inner{padding:12px 14px 4px}
  .detail-inner h4{font-size:11px; color:var(--dim); text-transform:uppercase; letter-spacing:.6px; margin:0 0 5px; font-weight:600}
  .dose-full{font-size:12.5px; color:var(--dim); margin-bottom:11px}
  .dose-full b{color:var(--txt)}
  .note{font-size:13px; white-space:pre-line; color:#3a424c}
  .note .hl{color:var(--warn); font-weight:600}

  .empty{text-align:center; color:var(--dim); padding:60px 20px; display:none}
  footer{text-align:center; color:var(--faint); font-size:12px; padding:20px; line-height:1.7}

  /* 設定鈕 */
  .settings-chip{background:var(--gold-soft); border-color:var(--gold); color:#8a6d1f; font-weight:600}
  .settings-chip:hover{background:var(--gold); color:#4a3b0e}
  .card-edit{background:none; border:none; color:var(--faint); cursor:pointer; font-size:11.5px; padding:0 2px}
  .card-edit:hover{color:var(--accent)}

  /* Modal */
  .modal-bg{
    position:fixed; inset:0; background:rgba(43,44,38,.45); z-index:50;
    display:none; align-items:flex-start; justify-content:center; padding:40px 16px; overflow-y:auto;
  }
  .modal-bg.open{display:flex}
  .modal{
    background:var(--card); border-radius:14px; width:100%; max-width:560px;
    box-shadow:0 20px 60px rgba(43,44,38,.25); overflow:hidden;
  }
  .modal-head{display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--line); background:var(--accent); color:#fff}
  .modal-head h2{font-size:16px; margin:0}
  .modal-x{background:none; border:none; color:#fff; font-size:16px; cursor:pointer; opacity:.85}
  .modal-x:hover{opacity:1}
  .modal-body{padding:16px 20px 20px}
  .tabs{display:flex; gap:6px; margin-bottom:14px}
  .tab{padding:6px 14px; border:1px solid var(--line); background:var(--bg); border-radius:7px; cursor:pointer; font-size:13px; color:var(--dim)}
  .tab.active{background:var(--accent); color:#fff; border-color:var(--accent); font-weight:600}
  .tab-pane.hidden{display:none}
  .modal-body label{display:block; font-size:12px; color:var(--dim); margin-bottom:11px}
  .modal-body input,.modal-body select,.modal-body textarea{
    width:100%; margin-top:4px; padding:8px 10px; font-size:13.5px; color:var(--txt);
    background:var(--bg); border:1px solid var(--line); border-radius:7px; outline:none; font-family:inherit;
  }
  .modal-body input:focus,.modal-body select:focus,.modal-body textarea:focus{border-color:var(--accent)}
  .modal-body textarea{resize:vertical}
  .frow{display:flex; gap:12px} .frow label{flex:1}
  .frow3{display:flex; gap:12px} .frow3 label{flex:1}
  .modal-actions{display:flex; align-items:center; justify-content:flex-end; gap:10px; margin-top:6px}
  .modal-actions.left{justify-content:flex-start; margin:8px 0 16px}
  .edit-hint{font-size:12px; color:var(--accent); margin-right:auto}
  .btn-primary{background:var(--accent); color:#fff; border:none; padding:9px 18px; border-radius:8px; font-size:13.5px; font-weight:600; cursor:pointer}
  .btn-primary:hover{background:#57701b}
  .btn-line{background:var(--card); color:var(--txt); border:1px solid var(--line); padding:8px 14px; border-radius:8px; font-size:13px; cursor:pointer}
  .btn-line:hover{border-color:var(--accent); color:var(--accent)}
  .btn-line.danger:hover{border-color:var(--warn); color:var(--warn)}
  .save-note,.io-desc{font-size:11.5px; color:var(--faint); line-height:1.6; margin:4px 0 0}
  .io-desc{margin:2px 0 8px}
  @media(max-width:480px){.frow,.frow3{flex-direction:column; gap:0}}
</style>
</head>

    <h1>麻醉藥典</h1>
    <span class="subtitle">臨床快查 · 機轉分類</span>
    <span class="count-pill" id="count"></span>
  </div>
  <div class="search-wrap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="search" placeholder="搜尋藥名、別名、機轉或分類（例：propofol、CCB、GABA）">
  </div>
  <div class="filters" id="filters">
    <div class="chip active" data-cat="all">全部</div>
    <div class="chip" data-cat="induce">誘導 / 鎮靜</div>
    <div class="chip" data-cat="opioid">阿片止痛</div>
    <div class="chip" data-cat="nmb">肌肉鬆弛</div>
    <div class="chip" data-cat="reversal">解藥 / 逆轉</div>
    <div class="chip" data-cat="vaso">升 / 降壓</div>
    <div class="chip" data-cat="anti">抗膽鹼 / 其他</div>
    <div class="chip" data-cat="acls">ACLS 急救</div>
    <div class="chip" data-cat="special">其他 / 特殊</div>
    <button id="settingsBtn" class="chip settings-chip" title="設定 / 新增藥物">＋ 補充資料</button>
  </div>
</header>

<div id="modalBg" class="modal-bg">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modalTitle">新增藥物</h2>
      <button class="modal-x" id="modalX">關閉</button>
    </div>
    <div class="modal-body">
      <div class="tabs">
        <button class="tab active" data-tab="add">新增 / 編輯</button>
        <button class="tab" data-tab="io">匯出 / 匯入</button>
      </div>

      <div class="tab-pane" id="pane-add">
        <div class="frow">
          <label>分類
            <select id="f-cat">
              <option value="induce">誘導 / 鎮靜</option>
              <option value="opioid">阿片止痛</option>
              <option value="nmb">肌肉鬆弛</option>
              <option value="reversal">解藥 / 逆轉</option>
              <option value="vaso">升 / 降壓</option>
              <option value="anti">抗膽鹼 / 其他</option>
              <option value="acls">ACLS 急救</option>
            </select>
          </label>
          <label>藥名（英文）<input id="f-name" placeholder="例：Norepinephrine"></label>
        </div>
        <div class="frow">
          <label>別名 / 中文<input id="f-alias" placeholder="例：Levophed / 正腎上腺素"></label>
          <label>機轉分類標籤<input id="f-cls" placeholder="例：升壓 · α/β 促效劑"></label>
        </div>
        <label>綜合知識（白話機轉，一兩句）<textarea id="f-know" rows="2" placeholder="這類藥怎麼作用、為什麼這樣用"></textarea></label>
        <div class="frow3">
          <label>劑量<input id="f-dose" placeholder="0.05–0.5 mcg/kg/min"></label>
          <label>Onset<input id="f-onset" placeholder="數分鐘"></label>
          <label>Duration<input id="f-dur" placeholder="短"></label>
        </div>
        <label>完整用法<textarea id="f-doseFull" rows="2" placeholder="含劑型、稀釋、追加方式等"></textarea></label>
        <label>備註 / 注意事項（換行分段；用 [紅] 包住的字會標紅，例：[紅]外滲會壞死[/紅]）<textarea id="f-note" rows="3"></textarea></label>
        <label>仿單 PDF 檔名（放在同資料夾；沒有可留空）<input id="f-insert" placeholder="Norepinephrine.pdf"></label>
        <div class="modal-actions">
          <span id="editHint" class="edit-hint"></span>
          <button class="btn-primary" id="saveDrug">加入藥典</button>
        </div>
        <p class="save-note">新增的藥會即時顯示，並存在此瀏覽器；換裝置或想永久保存，請到「匯出 / 匯入」下載 JSON 備份。</p>
      </div>

      <div class="tab-pane hidden" id="pane-io">
        <p class="io-desc">匯出目前全部藥物資料（含你新增的），可交給我更新網頁、或日後匯入還原。</p>
        <div class="modal-actions left">
          <button class="btn-line" id="exportJson">下載 JSON 備份</button>
          <button class="btn-line" id="copyJson">複製到剪貼簿</button>
        </div>
        <p class="io-desc">貼上先前匯出的 JSON 後按「匯入」，會以該份資料取代目前新增的藥物。</p>
        <textarea id="importBox" rows="5" placeholder="在此貼上 JSON…"></textarea>
        <div class="modal-actions left">
          <button class="btn-line" id="importJson">匯入</button>
          <button class="btn-line danger" id="clearCustom">清除我新增的藥物</button>
        </div>
      </div>
    </div>
  </div>
</div>

</main>

  dose:"0.03–0.1 mg/kg", onset:"30–60 秒", dur:"15–30 分",
  doseFull:"0.03–0.1 mg/kg IV，每次給藥間隔至少兩分鐘。劑型 5mg/5mL amp。",
  note:"鎮靜、抗焦慮、抗痙攣、夢遊、呼吸抑制、嗜睡、低血壓。良好鎮靜與遺忘作用。\n常用於 premedication。\n心導管室劑型與麻醉科不同，使用請小心。",
  insert:"Dormicum.pdf"},

 {cat:"induce", name:"Remimazolam", alias:"Byfavo", cls:"鎮靜 · BZD · GABA-A 促效劑",
  know:"新一代超短效苯二氮平類，由血中酯酶快速代謝，起效快、清醒完全。逆轉劑為 Flumazenil。",
  dose:"2.5–5 mg IV", onset:"1 分鐘內", dur:"半衰期 3–10 分",
  doseFull:"誘導 2.5–5 mg IV（注射 >1 分）；追加 2.5 mg（注射 >15 秒）。總劑量最大 17.5–33 mg。劑型 20mg/vial，加 8.2mL NS 稀釋為 2.5mg/mL。",
  note:"鎮靜誘導：投予 Fentanyl 後等 1–2 分鐘再給起始劑量。\n<span class='hl'>與 LR（乳酸林格氏液）不相容</span>。\n鎮靜高峰：起始劑量後約 3–3.5 分達最深；最後一劑後約 11–14 分完全清醒。",
  insert:"Byfavo.pdf"},

 {cat:"induce", name:"Ketamine", alias:"Ketalar", cls:"解離麻醉 · NMDA 受體拮抗劑",
  know:"阻斷 NMDA 受體產生「解離性麻醉」。保留呼吸道反射、是強力支氣管擴張劑，適合氣喘或低血壓病人與兒童。會升高心跳、血壓、腦壓。屬管制藥。",
  dose:"1–4.5 mg/kg IV", onset:"30 秒(IV) / 3–4 分(IM)", dur:"5–10 分(IV)",
  doseFull:"IV 1–4.5 mg/kg；IM 9–12 mg/kg（作用 12–25 分）。劑型 500mg/10mL vial，通常抽 1–2mL 備用，記得填寫管制藥紀錄單。",
  note:"可給 Atropine、Robinul 減少 Ketamine 引起的唾液分泌過多。\n心跳↑、血壓↑、眼壓↑、腦壓↑，夢魘、解離性麻醉、噁心嘔吐。\n保留呼吸道反射，為強力支氣管擴張劑，適合氣喘或低血壓患者、兒童常用。",
  insert:"Ketamine.pdf"},

 {cat:"induce", name:"Dexmedetomidine", alias:"Precedex", cls:"鎮靜 · 選擇性 α2 腎上腺素受體促效劑",
  know:"作用於 α2 受體，產生「可喚醒的鎮靜」且不抑制呼吸，適合術後與 ICU。會降低心跳與血壓。",
  dose:"0.5–1 mcg/kg 起始", onset:"5–10 分", dur:"半衰期約 2 小時",
  doseFull:"起始 0.5–1 mcg/kg 連續輸注 10 分，之後維持 0.2–0.7 mcg/kg/hr。配製：抽 2mL Precedex 加 48mL 0.9% NaCl 成 50mL（40mcg/mL）。劑型 200mcg/2mL vial。",
  note:"不抑制呼吸，HR↓、BP↓，鎮靜但保留呼吸，適用術後與 ICU。\n腎/肝功能不全或年老病人可能須降低劑量。\n<span class='hl'>低血壓與心搏徐緩，部分案例甚至導致死亡</span>。處理：減少/停止輸注、增加輸液速率、抬高下肢、血管收縮劑；可考慮抗膽鹼藥物（glycopyrrolate、atropine）改善迷走神經活性。",
  insert:"Precedex.pdf"},

 {cat:"anti", name:"Dynastat", alias:"Parecoxib", cls:"止痛 · COX-2 選擇性抑制劑（NSAIDs）",
  know:"選擇性抑制 COX-2、減少發炎前列腺素以止痛，屬非類固醇消炎藥。無阿片類的呼吸抑制，常作術後多模式止痛的一環。",
  dose:"40 mg IV/IM", onset:"7–13 分顯著止痛", dur:"6–12 小時以上",
  doseFull:"建議 40 mg 靜脈或肌肉注射，之後視需要每 12–24 小時可再給 20mg。劑型 40mg/vial（粉劑），相容 N/S、D5W、林格氏乳酸鹽注射液。",
  note:"短期（不宜超過四天）用於外科手術後疼痛緩解。臨床有意義止痛約 23–39 分，最大效果 2 小時內。\n<span class='hl'>心血管栓塞事件</span>：NSAIDs 增加嚴重心血管栓塞（心肌梗塞、中風）風險，用藥時間越長風險越大。CABG 術後 14 天內禁用。\nLR 或含葡萄糖 5% 的林格氏乳酸鹽會使 parecoxib 沉澱，不宜作調配溶劑；注射用水也不宜（非等張）。",
  insert:"Dynastat.pdf"},

 {cat:"anti", name:"Propacetamol", alias:"Acetamol", cls:"止痛退燒 · 中樞前列腺素抑制",
  know:"乙醯胺酚（acetaminophen）的靜脈前驅藥。抑制中樞前列腺素合成止痛，並作用於下視丘體溫調節中樞退燒。無消炎、不傷胃、不影響凝血。",
  dose:"1–2 g IV q4h", onset:"約 15–30 分", dur:"約 4–6 小時",
  doseFull:"成人 1–2 g IV 每 4 小時一次，每日最大 6 g；孩童 >4 歲 30 mg/kg IV 每 6 小時，最大 120 mg/kg/day。劑型 1 g/vial。",
  note:"限用於成人及四歲以上（或體重 17 公斤以上）孩童。\n嚴重腎病患投予前需諮詢醫師。\n處理時請戴手套，避免接觸性濕疹。\n<span class='hl'>藥物過量可能引起肝細胞壞死或腦部病變，嚴重者昏迷或死亡</span>。",
  insert:"acetamol.pdf"},

 {cat:"anti", name:"Atropine", alias:"", cls:"抗膽鹼 · 蕈毒鹼(Muscarinic)受體拮抗劑",
  know:"阻斷副交感神經的蕈毒鹼受體，提高心跳、減少分泌物。作用快，但會穿越血腦障壁可能引起中樞副作用。",
  dose:"0.5–1.0 mg IV", onset:"約 1–2 分(IV)", dur:"約 30–60 分",
  doseFull:"成人 0.5–1.0 mg IV；兒童 10–20 mcg/kg IV（不建議低於最低有效劑量，否則可能反射性心跳變慢）。劑型 1mg/mL amp。",
  note:"注意事項與禁忌：青光眼、攝護腺肥大導致排尿困難、重症肌無力、器質性幽門阻塞或腸阻塞、急性出血、心肌缺血。\n<span class='hl'>可穿越 BBB，可能引起中樞副作用（譫妄、躁動、視幻覺）</span>；若僅需抗膽鹼作用，建議優先選無法穿越 BBB 的 Glycopyrrolate 更安全。",
  insert:"Atropine.pdf"},

 {cat:"anti", name:"Glycopyrrolate", alias:"Robinul", cls:"抗膽鹼 · 四級胺（不入中樞）",
  know:"季銨（四級胺）結構、無法通過血腦障壁，較不引起中樞副作用（如譫妄），是比 Atropine 更「乾淨」的抗膽鹼選擇。",
  dose:"0.1 mg IV", onset:"1 分鐘內", dur:"迷走阻斷 2–3 小時",
  doseFull:"IV 0.1 mg（0.5 mL），每 2–3 分可重複。劑型 0.2mg/mL amp。最大藥效 30–45 分，止涎效果可持續到 7 小時。",
  note:"不能通過 BBB，較不引起中樞副作用（如譫妄）。\n禁忌：新生兒（含 Benzyl alcohol 成分）、青光眼、尿道/胃腸道阻塞、重症肌無力、心血管不穩、老年腸道鬆弛。\n過量處理：Neostigmine（IV 0.25 mg 每 5–10 分）；若中樞症狀出現給 Physostigmine（IV 0.5–2 mg 緩注）。",
  insert:"Robinul.pdf"},

 {cat:"opioid", name:"Fentanyl", alias:"", cls:"阿片止痛 · μ-opioid 受體促效劑",
  know:"結合 μ 鴉片受體止痛，力量約嗎啡 100 倍、起效快、作用約 30 分。麻醉常用止痛藥，作用與劑量成正比。",
  dose:"2–20 mcg/kg", onset:"1–2 分", dur:"30–60 分",
  doseFull:"低劑量 2 mcg/kg；中劑量 2–20 mcg/kg；高劑量 20–50 mcg/kg。兒童(2–12歲) 2–3 μg/kg；老年/虛弱者起始應減量。劑型 100mcg/2mL amp。",
  note:"<span class='hl'>1. 呼吸抑制（最嚴重）</span>\n2. 肌肉僵硬 → 避免方式：慢速注射、術前給 BZD、搭配肌鬆劑。\n3. 心跳過慢（尤其未給抗膽鹼藥）、低血壓，術前可用 atropine 預防。\n4. 與 SSRI、SNRI、MAOI 併用 → 血清素症候群風險（躁動、體溫升高、反射亢進），須立即停藥。",
  insert:"Fentanyl.pdf"},

 {cat:"opioid", name:"Alfentanil", alias:"", cls:"阿片止痛 · μ-opioid 受體促效劑",
  know:"作用快、藥效短，常用於短程及門診手術的麻醉鎮痛。血漿蛋白結合率約 92%。",
  dose:"7–15 mcg/kg IV", onset:"<1 分", dur:"10–15 分",
  doseFull:"7–15 mcg/kg（1–2mL/70kg）IV，之後追加維持 3.5 mcg/kg。與其他藥併用時劑量可能減半。劑型 1000mcg/2mL amp。低於 7 mcg/kg 且緩慢注射時，大多病人可維持自然呼吸。",
  note:"呼吸抑制、肌肉僵直、低血壓、心跳減慢；老年人/肝腎功能不全需調整劑量。\n<span class='hl'>勿與 MAOI 併用，建議術前停藥 2 週；與 SSRI、SNRI、MAOI、tramadol 併用需小心（血清素症候群風險）</span>。\n蛋白結合率高，與 Warfarin、Phenytoin 併用要特別小心：白蛋白低或蛋白結合競爭會使游離藥物比例上升、藥效加強。",
  insert:"Alfentanil.pdf"},

 {cat:"opioid", name:"Remifentanil", alias:"", cls:"阿片止痛 · μ-opioid 受體促效劑",
  know:"經血漿非特異性酯酶代謝，不依賴肝腎，重症或器官衰竭病人可安全使用。起效快、回復快，適合快速調整麻醉深度，TIVA 常用。context-sensitive half-time 不隨輸注時間延長。",
  dose:"1 mcg/kg bolus", onset:"1 分", dur:"5–10 分",
  doseFull:"1 mcg/kg bolus（注射 >30–60 秒）；持續輸注 0.05–1 μg/kg/min。劑型 2mg/vial（粉劑）加 NS 40mL 成 50 μg/mL。一般 pump 設定：體重除以十 ≈ 0.1 μg/kg/min 注射量。",
  note:"低血壓、心跳慢、呼吸抑制、肌肉僵直（尤其快速推注時）。\n<span class='hl'>停藥恢復快，但須注意疼痛反彈</span>，建議與長效止痛交替使用，或於手術結束前轉換藥物以減少術後疼痛反彈。",
  insert:"Remifentanil.pdf"},

 {cat:"nmb", name:"Succinylcholine", alias:"Anectine", cls:"去極化肌肉鬆弛 · 菸鹼 ACh 受體促效劑",
  know:"模仿乙醯膽鹼與終板受體結合，造成「持續去極化」使肌肉無法再興奮。極速插管、短效，快速插管首選之一。",
  dose:"1–1.5 mg/kg IV", onset:"30–60 秒", dur:"5–10 分",
  doseFull:"1–1.5 mg/kg IV。劑型 500mg/vial，中榮麻醉通常稀釋成 20 mg/mL。靜注 10–30mg 時肌弛通常 1 分內出現、2 分內達最高、約 5 分後消失。",
  note:"<span class='hl'>風險：高鉀、惡性高熱、肌肉疼痛</span>。\n慎用/不投與：新鮮熱傷、尿毒症、四肢麻痺、廣範挫滅性外傷（引起心臟停止跳動之顧慮）。\nSuccinylcholine 由血漿 pseudocholinesterase 代謝；若合併抗膽鹼酯酶藥（如 neostigmine）會抑制此酶，使分解變慢 → 肌鬆時間延長、呼吸肌恢復延遲。",
  insert:"anection.pdf"},

 {cat:"nmb", name:"Rocuronium", alias:"Esmeron", cls:"非去極化肌肉鬆弛 · 菸鹼 ACh 受體拮抗劑",
  know:"競爭性阻斷菸鹼受體。無高鉀風險，可替代 Succinylcholine 用於 RSI（快速插管），且可用 Sugammadex 快速拮抗。",
  dose:"0.6–1.2 mg/kg", onset:"1–2 分", dur:"30–60 分",
  doseFull:"誘導 0.6–1.2 mg/kg；維持 0.15 mg/kg 每 30 分；持續輸注 0.3–0.6 mg/kg/hr。RSI 建議 1.0 mg/kg，多數 60 秒內可插管。劑型 50mg/5mL vial。",
  note:"無高鉀風險，可替代 Succinylcholine 用於 RSI，可用 Sugammadex 拮抗。\n超重/肥胖病人（超過理想體重 30% 以上）依理想體重計算並減量。\n<span class='hl'>可能增強作用：低血鉀、高血鎂、低血鈣、低血蛋白、脫水、酸中毒、高血二氧化碳、惡病質</span>。盡量矯正電解質失衡、pH 與脫水。",
  insert:"Esmeron.pdf"},

 {cat:"nmb", name:"Cisatracurium", alias:"Nimbex", cls:"非去極化肌肉鬆弛 · 菸鹼 ACh 受體拮抗劑",
  know:"經 Hofmann 分解（器官獨立代謝）與酯酶水解，不需肝腎代謝，適合肝腎功能不全病人。需冷藏保存。",
  dose:"0.15–0.2 mg/kg", onset:"2–3 分", dur:"20–35 分",
  doseFull:"誘導 0.15–0.2 mg/kg；維持 0.03 mg/kg 每 20 分；持續輸注 0.06–0.18 mg/kg/hr 或 1–3 mcg/kg/min。劑型 10mg/5mL amp。",
  note:"儲存：冷藏 2–8°C，開瓶後室溫穩定 24 小時內使用。\n以乳酸鹽林格氏液稀釋不具化學安定性；只在酸性溶液中才安定。\n<span class='hl'>不可和鹼性溶液（如 sodium thiopentone）混於同針筒或經同針頭同時給藥</span>。與 ketorolac、trometamol 或可注射 propofol 乳化劑並不相容。",
  insert:"Nimbex.pdf"},

 {cat:"reversal", name:"Naloxone", alias:"", cls:"阿片逆轉 · μ-opioid 受體拮抗劑",
  know:"競爭性阻斷 μ 受體，逆轉阿片類的呼吸抑制與過度鎮靜。作用時間可能短於阿片類，需持續監控避免再抑制。",
  dose:"0.4–2 mg IV", onset:"1–2 分", dur:"30–60 分",
  doseFull:"成人起始 0.4–2 mg IV push，總劑量上限 10 mg；小兒起始 0.01 mg/kg IV push，效果不佳改 0.1 mg/kg 可重複。劑型 0.4mg/mL amp。",
  note:"若未達預期復甦或改善呼吸，給藥後 2–3 分再重複；投與 10mg 仍無反應應再確認是否為阿片類中毒。\n部分阿片類作用時間比本藥持久，須持續監控、必要時重複給藥。\n<span class='hl'>阿片依賴病人使用後可能產生戒斷症狀</span>：身體疼痛、腹瀉、心搏過速、噁心嘔吐、緊張、亢奮、顫抖、血壓升高。術後突然逆轉可能導致噁心嘔吐、發汗、心搏過速、血壓上升、肺水腫、心跳停止。",
  insert:"Naloxone.pdf"},

 {cat:"reversal", name:"Flumazenil", alias:"Anexate", cls:"BZD 逆轉 · GABA-A 受體拮抗劑",
  know:"競爭性阻斷苯二氮平結合位，逆轉 Midazolam、Byfavo 等的鎮靜。注意可能誘發癲癇。",
  dose:"0.2 mg IV 起始", onset:"1–2 分", dur:"30–60 分",
  doseFull:"起始 0.2 mg IV（注射 >15 秒）；追加：60 秒內無改善可每 60 秒加 0.1 mg IV，最大總劑 1.0 mg。劑型 0.5mg/5mL amp。一般劑量 0.3–0.6 mg。",
  note:"解 midazolam / byfavo，<span class='hl'>注意癲癇風險</span>。\n混合藥物過量情況下須特別小心：其他藥物（尤其環狀抗憂鬱劑）過量的毒性（如痙攣、心律不整）可能因 BZD 作用被逆轉而浮現。",
  insert:"Flumazenil.pdf"},

 {cat:"reversal", name:"Neostigmine", alias:"Vagostin", cls:"肌鬆逆轉 · 抗膽鹼酯酶",
  know:"抑制乙醯膽鹼酯酶、提高神經肌肉接合處 ACh 濃度，逆轉非去極化肌鬆劑。因會刺激副交感，須合併抗膽鹼藥。",
  dose:"0.03–0.07 mg/kg IV", onset:"約 5–15 分", dur:"約 20–60 分",
  doseFull:"0.03–0.07 mg/kg IV。臨床常用 0.5mg Neostigmine 配 0.1mg Robinul。劑型 0.5mg/mL amp。",
  note:"通常與 Atropine 或 Glycopyrrolate 併用以防副交感神經過度刺激（心跳過慢、流涎）。\n<span class='hl'>禁忌：氣道阻塞者慎用、蠕動過強或消化道穿孔者禁用、慎防膽鹼危象（cholinergic crisis）</span>。需確認 TOF ratio ≥ 0.9 再給予，避免過早給藥造成肌鬆再阻斷。",
  insert:"getFile4.pdf"},

 {cat:"reversal", name:"Sugammadex", alias:"Bridion", cls:"肌鬆逆轉 · 選擇性結合劑",
  know:"直接以分子「包覆」Rocuronium / Vecuronium 使其失效，快速逆轉肌鬆，速度遠快於 Neostigmine。肥胖病人以實際體重計算。",
  dose:"2 / 4 / 16 mg/kg", onset:"約 1.5–3 分", dur:"—",
  doseFull:"成人：T2 再現(中度阻斷) 2 mg/kg（約 2 分）；1–2 PTC(深度阻斷) 4 mg/kg（約 3 分）；立即逆轉(Roc 1.2mg/kg 後) 16 mg/kg（約 1.5 分）。小兒(2歲以上)劑量同成人（以體重計）。劑型 200mg/2mL amp。肥胖患者以「實際體重」計算。",
  note:"選擇性結合類固醇類神經肌肉阻斷劑（尤其 Rocuronium 與 Vecuronium），快速逆轉肌鬆。\n<span class='hl'>不應用於逆轉非類固醇神經肌肉阻斷劑</span>（如 succinylcholine、benzylisoquinolinium 化合物：Cisatracurium、Atracurium）。\n重度腎功能不全（含需洗腎；CrCl <30 mL/min）不建議施用。",
  insert:"GetInsertEFile.pdf"},

 {cat:"vaso", name:"Ephedrine", alias:"", cls:"升壓 · 間接型 α/β 促效劑",
  know:"間接促進去甲腎上腺素釋放，同時興奮 α 與 β 受體，升高血壓與心跳，常用於麻醉引起的低血壓。",
  dose:"5–10 mg IV bolus", onset:"1–2 分", dur:"10–20 分",
  doseFull:"5–10 mg IV bolus，可依血壓反應重複，每 24 小時可達 150mg。劑型 40mg/mL amp。",

const INSERT_DIR = "";
const LS_KEY = "pharmacopedia_custom_v1";

// 標記內建藥物（其備註含可信 HTML），使用者新增的則需跳脫處理
DRUGS.forEach(d=>d._builtin=true);

let CUSTOM = loadCustom();          // 使用者新增的藥（陣列）
let activeCat = "all", query = "", editIndex = null;

function loadCustom(){
  try{ return JSON.parse(localStorage.getItem(LS_KEY)) || []; }catch(e){ return []; }
}
function saveCustom(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(CUSTOM)); }
  catch(e){ /* 部分環境不支援儲存，資料仍在本次階段有效 */ }
}
function allDrugs(){ return DRUGS.concat(CUSTOM); }

function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
// 備註：內建可信直接輸出；使用者輸入先跳脫再把 [紅]..[/紅] 轉成標紅
function fmtNote(d){
  if(d._builtin) return d.note;
  return esc(d.note).replace(/\[紅\]([\s\S]*?)\[\/紅\]/g,'<span class="hl">$1</span>').replace(/\n/g,'\n');
}
function txt(d,field){ return d._builtin ? d[field] : esc(d[field]); }

function render(){
  const cards = document.getElementById("cards");
  cards.innerHTML = "";
  let shown = 0, total = allDrugs().length;
  const q = query.trim().toLowerCase();
  CAT_ORDER.forEach(cat=>{
    if(activeCat!=="all" && activeCat!==cat) return;
    const list = allDrugs().map((d,i)=>({d,i})).filter(x=>x.d.cat===cat).filter(x=>{
      if(!q) return true;
      const d=x.d;
      return (d.name+" "+d.alias+" "+d.cls+" "+d.know).toLowerCase().includes(q);
    });
    if(!list.length) return;
    const head = document.createElement("div");
    head.className="cat-head";
    head.textContent = CAT_NAME[cat] + " · " + list.length;
    cards.appendChild(head);
    const grid = document.createElement("div");
    grid.className="grid";
    list.forEach(x=>{ grid.appendChild(makeCard(x.d,x.i)); shown++; });
    cards.appendChild(grid);
  });
  document.getElementById("empty").style.display = shown? "none":"block";
  document.getElementById("count").textContent = shown + " / " + total + " 種藥物";
}

function makeCard(d, globalIndex){
  const card = document.createElement("div");
  card.className="card";
  const insertBtn = d.insert
    ? `<a class="btn insert" href="${INSERT_DIR}${encodeURIComponent(d.insert)}" target="_blank">仿單</a>`
    : `<span class="btn insert pending" title="目前無對應仿單">仿單待補</span>`;
  const editBtn = d._builtin ? "" : `<button class="card-edit" title="編輯">編輯</button>`;
  card.innerHTML = `
    <div class="card-top">
      <span class="class-tag">${txt(d,'cls')}</span>
      <div class="name-row">
        <span class="drug-name">${txt(d,'name')}</span>
        ${d.alias?`<span class="drug-alias">${txt(d,'alias')}</span>`:""}
      </div>
      <div class="mech">${txt(d,'know')}</div>
      <div class="quick">
        <div class="q dose"><span class="lbl">劑量</span><span class="val">${txt(d,'dose')}</span></div>
        <div class="q"><span class="lbl">Onset</span><span class="val">${txt(d,'onset')}</span></div>
        <div class="q"><span class="lbl">Duration</span><span class="val">${txt(d,'dur')}</span></div>
      </div>
    </div>
    <div class="card-foot">
      ${insertBtn}
      ${editBtn}
      <button class="expand-btn">展開備註 ▾</button>
    </div>
    <div class="detail"><div class="detail-inner">
      <div class="dose-full"><b>用法：</b>${txt(d,'doseFull')}</div>
      <h4>備註 · 注意事項</h4>
      <div class="note">${fmtNote(d)}</div>
    </div></div>
  `;
  card.querySelector(".card-top").addEventListener("click",()=>toggle(card));
  card.querySelector(".expand-btn").addEventListener("click",(e)=>{e.stopPropagation();toggle(card);});
  if(!d._builtin){
    card.querySelector(".card-edit").addEventListener("click",(e)=>{
      e.stopPropagation();
      openModal(globalIndex - DRUGS.length); // custom 陣列中的索引
    });
  }
  return card;
}
function toggle(card){
  card.classList.toggle("open");
  const b = card.querySelector(".expand-btn");
  b.textContent = card.classList.contains("open") ? "收合 ▴" : "展開備註 ▾";
}

document.getElementById("filters").addEventListener("click",e=>{
  if(e.target.id==="settingsBtn"){ openModal(null); return; }
  if(!e.target.classList.contains("chip")) return;
  document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
  e.target.classList.add("active");
  activeCat = e.target.dataset.cat;
  render();
});
document.getElementById("search").addEventListener("input",e=>{ query=e.target.value; render(); });

// ── 設定 / 新增 Modal ──────────────────────────────
const FIELDS = ["cat","name","alias","cls","know","dose","onset","dur","doseFull","note","insert"];
const modalBg = document.getElementById("modalBg");

function openModal(idx){
  editIndex = (typeof idx==="number") ? idx : null;
  document.getElementById("modalTitle").textContent = editIndex!=null ? "編輯藥物" : "新增藥物";
  document.getElementById("editHint").textContent = editIndex!=null ? "編輯中（僅限自訂藥物）" : "";
  document.getElementById("saveDrug").textContent = editIndex!=null ? "儲存變更" : "加入藥典";
  const d = editIndex!=null ? CUSTOM[editIndex] : {cat:"vaso"};
  FIELDS.forEach(f=>{ const el=document.getElementById("f-"+f); if(el) el.value = d[f]||""; });
  switchTab("add");
  modalBg.classList.add("open");
}
function closeModal(){ modalBg.classList.remove("open"); }
document.getElementById("modalX").addEventListener("click",closeModal);
modalBg.addEventListener("click",e=>{ if(e.target===modalBg) closeModal(); });

document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>switchTab(t.dataset.tab)));
function switchTab(name){
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.tab===name));
  document.getElementById("pane-add").classList.toggle("hidden",name!=="add");
  document.getElementById("pane-io").classList.toggle("hidden",name!=="io");
}

document.getElementById("saveDrug").addEventListener("click",()=>{
  const rec={};
  FIELDS.forEach(f=>{ const el=document.getElementById("f-"+f); rec[f]= el? el.value.trim() : ""; });
  if(!rec.name){ document.getElementById("f-name").focus(); return; }
  if(!rec.insert) rec.insert=null;
  if(editIndex!=null) CUSTOM[editIndex]=rec; else CUSTOM.push(rec);
  saveCustom(); render(); closeModal();
});

document.getElementById("exportJson").addEventListener("click",()=>{
  const blob=new Blob([JSON.stringify(CUSTOM,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download="麻醉藥典_我的新增.json"; a.click();
});
document.getElementById("copyJson").addEventListener("click",e=>{
  const txt=JSON.stringify(CUSTOM,null,2);
  if(navigator.clipboard){ navigator.clipboard.writeText(txt); e.target.textContent="已複製"; setTimeout(()=>e.target.textContent="複製到剪貼簿",1500); }
});
document.getElementById("importJson").addEventListener("click",()=>{
  const box=document.getElementById("importBox");
  try{
    const arr=JSON.parse(box.value);
    if(!Array.isArray(arr)) throw 0;
    CUSTOM=arr; saveCustom(); render(); box.value=""; switchTab("add"); closeModal();
  }catch(e){ box.style.borderColor="var(--warn)"; }
});
document.getElementById("clearCustom").addEventListener("click",()=>{
  if(confirm("確定清除所有你新增的藥物？（不影響內建藥物）")){ CUSTOM=[]; saveCustom(); render(); }
});

render();
</script>
</body>
</html>
